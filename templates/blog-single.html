{% extends 'base.html' %}
{% load static %}

{% block content %}
<section class="py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb mb-4">
                        <li class="breadcrumb-item"><a href="{% url 'home' %}" class="text-decoration-none">Home</a></li>
                        <li class="breadcrumb-item"><a href="{% url 'blog_list' %}" class="text-decoration-none">Blog</a></li>
                        <li class="breadcrumb-item active" aria-current="page">{{ blog.title }}</li>
                    </ol>
                </nav>

                <h1 class="fw-bold text-dark mb-2">{{ blog.title }}</h1>
                <p class="text-muted mb-4">chop etilgan sana: {{ blog.created_at|date:"d-F, Y" }}</p>
                
                {% if blog.image %}
                <div class="mb-4 text-center">
                    <img src="{{ blog.image.url }}" class="img-fluid rounded-4 shadow-sm w-100" style="max-height: 450px; object-fit: cover;" alt="{{ blog.title }}">
                </div>
                {% endif %}

                <div class="fs-5 text-secondary style-text lh-lg" style="white-space: pre-line;">
                    {{ blog.content }}
                </div>
                
                <hr class="my-5">
                <a href="{% url 'blog_list' %}" class="btn btn-dark rounded-pill px-4"> royxatga qaytish</a>
            </div>
        </div>
    </div>
</section>
{% endblock content %}
